apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "journal.fullname" . }}
  labels:
    {{- include "journal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "journal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "journal.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- if .Values.cnpg.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "journal.fullname" . }}-postgres-app
                  key: uri
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "journal.fullname" . }}
                  key: database-url
            {{- end }}
            - name: NUXT_SESSION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "journal.fullname" . }}
                  key: session-password
            - name: NUXT_OAUTH_OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: NUXT_OAUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "journal.fullname" . }}
                  key: oidc-client-secret
            - name: NUXT_OAUTH_OIDC_OPENID_CONFIG
              value: {{ printf "%s/.well-known/openid-configuration" .Values.oidc.issuerUrl | quote }}
            - name: NUXT_OAUTH_OIDC_REDIRECT_URL
              value: {{ .Values.oidc.redirectUrl | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
