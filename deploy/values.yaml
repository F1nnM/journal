replicaCount: 1

image:
  repository: ghcr.io/f1nnm/journal
  tag: latest
  pullPolicy: IfNotPresent

database:
  url: ""  # Required unless existingSecret is set
  existingSecret:
    name: ""  # If set, read DATABASE_URL from this secret instead
    key: uri

oidc:
  issuerUrl: ""
  clientId: ""
  clientSecret: ""
  redirectUrl: ""

session:
  password: ""  # Required: at least 32 chars

ingress:
  enabled: true
  className: nginx
  host: ""
  annotations: {}

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 256Mi
