apiVersion: apps/v1
kind: Deployment
metadata:
  name: journal-postgres
  labels:
    app: journal-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: journal-postgres
  template:
    metadata:
      labels:
        app: journal-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: journal
            - name: POSTGRES_USER
              value: journal
            - name: POSTGRES_PASSWORD
              value: journal
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "journal"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: journal-postgres
spec:
  selector:
    app: journal-postgres
  ports:
    - port: 5432
      targetPort: 5432
