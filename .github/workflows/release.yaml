name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/f1nnm/journal
  CHART_REPO: oci://ghcr.io/f1nnm/journal-charts

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Determine tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE }}:${{ github.sha }}"
          TAGS="$TAGS,${{ env.IMAGE }}:latest"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            TAGS="$TAGS,${{ env.IMAGE }}:$VERSION"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Bake image tag into chart
        run: 'sed -i "s/tag: latest/tag: ${{ github.sha }}/" deploy/values.yaml'

      - name: Publish SHA-versioned chart
        run: |
          sed -i "s/^version: .*/version: 0.0.0-${{ github.sha }}/" deploy/Chart.yaml
          helm package deploy/
          helm push journal-*.tgz ${{ env.CHART_REPO }}
          rm journal-*.tgz

      - name: Publish rolling latest chart
        run: |
          sed -i "s/^version: .*/version: 0.0.0/" deploy/Chart.yaml
          helm package deploy/
          helm push journal-*.tgz ${{ env.CHART_REPO }}
          rm journal-*.tgz

      - name: Publish release chart
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: $VERSION/" deploy/Chart.yaml
          helm package deploy/
          helm push journal-*.tgz ${{ env.CHART_REPO }}
